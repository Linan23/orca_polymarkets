services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - prod_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: docker/python-api.prod.Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      APP_ENV: ${APP_ENV}
      DATABASE_URL: ${DATABASE_URL}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE}
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE}
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN}
      DUNE_API_KEY: ${DUNE_API_KEY}
      DUNE_QUERY_ID: ${DUNE_QUERY_ID}
      POLYMARKET_ACTIVE_WINDOW_START: ${POLYMARKET_ACTIVE_WINDOW_START}
      POLYMARKET_ACTIVE_WINDOW_END: ${POLYMARKET_ACTIVE_WINDOW_END}
      KALSHI_ACTIVE_WINDOW_START: ${KALSHI_ACTIVE_WINDOW_START}
      KALSHI_ACTIVE_WINDOW_END: ${KALSHI_ACTIVE_WINDOW_END}
    command:
      - uvicorn
      - data_platform.api.server:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workers
      - "${API_WORKERS:-2}"
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: docker/web.prod.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  prod_pgdata:
  caddy_data:
  caddy_config:

