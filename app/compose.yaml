services:
  db:
    image: postgres:16
    container_name: orcaDB
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_db
    volumes:
      - pgdata:/var/lib/postgresql/data

  app_api:
    build:
      context: ..
      dockerfile: docker/python-api.Dockerfile
    working_dir: /workspace
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ..:/workspace
    environment:
      PYTHONPATH: /workspace
    depends_on:
      - db

  data_platform_api:
    build:
      context: ..
      dockerfile: docker/python-api.Dockerfile
    working_dir: /workspace
    command: uvicorn data_platform.api.server:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"
    volumes:
      - ..:/workspace
    environment:
      PYTHONPATH: /workspace
      DATABASE_URL: postgresql+psycopg://app:password@db:5432/app_db
      FRONTEND_ORIGIN: http://localhost:5173
    depends_on:
      - db

  react_app:
    build:
      context: ..
      dockerfile: docker/react.Dockerfile
    working_dir: /workspace/my-app
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ..:/workspace
      - react_node_modules:/workspace/my-app/node_modules
    environment:
      VITE_API_BASE_URL: ""
      VITE_PROXY_API_TARGET: http://data_platform_api:8001
    depends_on:
      - data_platform_api

volumes:
  pgdata:
  react_node_modules:
